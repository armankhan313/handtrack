<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hand Connect — Neon Hand Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --neon-cyan: #00f5ff;
    --neon-pink: #ff00ff;
    --neon-green: #00ff88;
    --neon-yellow: #ffff00;
    --neon-orange: #ff6600;
    --dark: #020408;
  }

  body {
    background: var(--dark);
    color: #fff;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  #app {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  #video {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    opacity: 0.35;
  }

  #canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    transform: scaleX(-1);
  }

  #hud {
    position: absolute;
    top: 18px; left: 18px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .hud-row {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--neon-cyan);
    text-shadow: 0 0 8px var(--neon-cyan);
    letter-spacing: 1px;
  }

  .hud-val { color: #fff; }

  #title-overlay {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 10;
    pointer-events: none;
  }

  #title-overlay h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(14px, 3vw, 26px);
    font-weight: 900;
    letter-spacing: 4px;
    background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink), var(--neon-green));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    filter: drop-shadow(0 0 12px rgba(0,245,255,0.6));
  }

  #title-overlay p {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 3px;
    margin-top: 4px;
  }

  #start-screen {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, #050d1a 0%, #020408 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    gap: 24px;
  }

  #start-screen h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(22px, 5vw, 48px);
    font-weight: 900;
    letter-spacing: 6px;
    background: linear-gradient(135deg, var(--neon-cyan) 0%, var(--neon-pink) 50%, var(--neon-green) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: titlePulse 3s ease-in-out infinite;
  }

  @keyframes titlePulse {
    0%, 100% { filter: drop-shadow(0 0 20px rgba(0,245,255,0.8)); }
    50% { filter: drop-shadow(0 0 40px rgba(255,0,255,0.8)); }
  }

  #start-screen p {
    color: rgba(255,255,255,0.5);
    font-size: 13px;
    letter-spacing: 2px;
    text-align: center;
    max-width: 320px;
    line-height: 1.8;
  }

  #start-btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 3px;
    padding: 14px 40px;
    background: transparent;
    border: 2px solid var(--neon-cyan);
    color: var(--neon-cyan);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s;
    text-shadow: 0 0 10px var(--neon-cyan);
    box-shadow: 0 0 20px rgba(0,245,255,0.3), inset 0 0 20px rgba(0,245,255,0.05);
  }

  #start-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,245,255,0.15), transparent);
    transform: translateX(-100%);
    transition: transform 0.4s;
  }

  #start-btn:hover::before { transform: translateX(0); }
  #start-btn:hover {
    box-shadow: 0 0 40px rgba(0,245,255,0.6), inset 0 0 40px rgba(0,245,255,0.1);
    border-color: #fff;
    color: #fff;
  }

  #loading {
    position: absolute;
    inset: 0;
    background: #020408;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 15;
    gap: 20px;
  }

  .loader-ring {
    width: 60px; height: 60px;
    border: 3px solid rgba(0,245,255,0.1);
    border-top: 3px solid var(--neon-cyan);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  #loading p {
    color: var(--neon-cyan);
    font-size: 12px;
    letter-spacing: 3px;
    text-shadow: 0 0 10px var(--neon-cyan);
    animation: blink 1.2s ease-in-out infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  #gesture-badge {
    position: absolute;
    top: 18px; right: 18px;
    z-index: 10;
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 8px 16px;
    border: 1px solid rgba(0,245,255,0.4);
    color: var(--neon-cyan);
    text-shadow: 0 0 8px var(--neon-cyan);
    box-shadow: 0 0 15px rgba(0,245,255,0.2);
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    transition: all 0.3s;
  }

  #scanline {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 5;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
  }

  #creator-badge {
    position: absolute;
    bottom: 80px;
    right: 18px;
    z-index: 10;
    text-align: right;
    pointer-events: none;
    animation: creatorPulse 3s ease-in-out infinite;
  }

  #creator-badge .made-by {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
  }

  #creator-badge .creator-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 15px;
    font-weight: 900;
    letter-spacing: 2px;
    background: linear-gradient(90deg, #ff4500, #ff0000, #cc0000);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 10px rgba(255,50,0,0.9));
  }

  #creator-badge .sharingan {
    font-size: 18px;
    display: inline-block;
    animation: spinSharingan 4s linear infinite;
    filter: drop-shadow(0 0 8px rgba(255,0,0,0.9));
  }

  #creator-badge .alias {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: #ff4500;
    text-shadow: 0 0 8px rgba(255,69,0,0.8);
    margin-top: 2px;
  }

  @keyframes creatorPulse {
    0%, 100% { opacity: 1; transform: translateY(0); }
    50% { opacity: 0.7; transform: translateY(-2px); }
  }

  @keyframes spinSharingan {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  #corner-tl, #corner-tr, #corner-bl, #corner-br {
    position: absolute;
    width: 30px; height: 30px;
    z-index: 10;
    pointer-events: none;
  }
  #corner-tl { top: 10px; left: 10px; border-top: 2px solid var(--neon-cyan); border-left: 2px solid var(--neon-cyan); }
  #corner-tr { top: 10px; right: 10px; border-top: 2px solid var(--neon-cyan); border-right: 2px solid var(--neon-cyan); }
  #corner-bl { bottom: 10px; left: 10px; border-bottom: 2px solid var(--neon-cyan); border-left: 2px solid var(--neon-cyan); }
  #corner-br { bottom: 10px; right: 10px; border-bottom: 2px solid var(--neon-cyan); border-right: 2px solid var(--neon-cyan); }
</style>
</head>
<body>
<div id="app">
  <!-- Start Screen -->
  <div id="start-screen">
    <h1>HAND CONNECT</h1>
    <p>Real-time hand tracking with neon visual effects. Powered by MediaPipe.</p>
    <button id="start-btn" onclick="startApp()">ACTIVATE CAMERA</button>
  </div>

  <!-- Loading -->
  <div id="loading">
    <div class="loader-ring"></div>
    <p>LOADING NEURAL NET...</p>
  </div>

  <!-- Main -->
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="scanline"></div>

  <!-- Corners -->
  <div id="corner-tl"></div>
  <div id="corner-tr"></div>
  <div id="corner-bl"></div>
  <div id="corner-br"></div>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-row">HANDS: <span class="hud-val" id="hud-hands">0</span></div>
    <div class="hud-row">FPS: <span class="hud-val" id="hud-fps">0</span></div>
    <div class="hud-row">GESTURE: <span class="hud-val" id="hud-gesture">—</span></div>
    <div class="hud-row">SPREAD: <span class="hud-val" id="hud-spread">0%</span></div>
  </div>

  <div id="gesture-badge" id="gesture-badge">SCANNING...</div>

  <!-- Creator Badge -->
  <div id="creator-badge">
    <div class="made-by">crafted by</div>
    <div class="creator-name"><span class="sharingan">🔴</span> ARMAN</div>
    <div class="alias">// MADARA UCHIHA //</div>
  </div>

  <!-- Title -->
  <div id="title-overlay">
    <h1>HAND CONNECT</h1>
    <p>NEON HAND TRACKER · MEDIAPIPE</p>
  </div>
</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let lastTime = performance.now();
let fps = 0;
let frameCount = 0;
let handsData = [];
let particleTrails = [];
let time = 0;

// Resize canvas
function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// Color palettes per hand
const HAND_COLORS = [
  ['#00f5ff','#ff00ff','#00ff88','#ffff00','#ff6600'],
  ['#ff00aa','#aa00ff','#00aaff','#ffaa00','#00ffaa']
];

const FINGER_CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],       // thumb
  [0,5],[5,6],[6,7],[7,8],       // index
  [0,9],[9,10],[10,11],[11,12],  // middle
  [0,13],[13,14],[14,15],[15,16],// ring
  [0,17],[17,18],[18,19],[19,20],// pinky
  [5,9],[9,13],[13,17]           // palm
];

function drawGlow(x, y, radius, color, alpha=1) {
  const grad = ctx.createRadialGradient(x, y, 0, x, y, radius);
  grad.addColorStop(0, color.replace(')', `,${alpha})`).replace('rgb', 'rgba').replace('#', 'rgba(') );
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.fill();
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function drawNeonLine(x1, y1, x2, y2, color, width=2, glowWidth=12) {
  // Outer glow
  ctx.save();
  ctx.shadowBlur = glowWidth * 2;
  ctx.shadowColor = color;
  ctx.strokeStyle = color;
  ctx.lineWidth = width + 4;
  ctx.globalAlpha = 0.3;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();

  // Inner bright line
  ctx.globalAlpha = 1;
  ctx.lineWidth = width;
  ctx.shadowBlur = glowWidth;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.restore();
}

function drawNeonDot(x, y, r, color) {
  ctx.save();
  ctx.shadowBlur = 20;
  ctx.shadowColor = color;
  ctx.fillStyle = color;
  ctx.globalAlpha = 1;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
  // White core
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(x, y, r * 0.4, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function getLandmarkPx(lm) {
  return {
    x: (1 - lm.x) * canvas.width,
    y: lm.y * canvas.height
  };
}

function detectGesture(landmarks) {
  const tips = [4, 8, 12, 16, 20];
  const bases = [3, 6, 10, 14, 18];
  let extended = 0;
  for (let i = 1; i < 5; i++) {
    if (landmarks[tips[i]].y < landmarks[bases[i]].y) extended++;
  }
  // Thumb
  const thumbExtended = landmarks[4].x < landmarks[3].x;
  if (extended === 0) return 'FIST';
  if (extended === 4 && thumbExtended) return 'OPEN';
  if (extended === 1 && !thumbExtended) return 'POINT';
  if (extended === 2) return 'PEACE';
  if (thumbExtended && extended === 0) return 'THUMBS UP';
  return 'HAND';
}

function getSpread(landmarks) {
  const wrist = landmarks[0];
  const mid = landmarks[12];
  const dist = Math.hypot(mid.x - wrist.x, mid.y - wrist.y);
  return Math.min(100, Math.round(dist * 200));
}

function addParticle(x, y, color) {
  particleTrails.push({
    x, y, color,
    vx: (Math.random() - 0.5) * 3,
    vy: (Math.random() - 0.5) * 3 - 1,
    life: 1,
    size: Math.random() * 4 + 2
  });
  if (particleTrails.length > 300) particleTrails.shift();
}

function updateParticles() {
  particleTrails = particleTrails.filter(p => p.life > 0.01);
  for (const p of particleTrails) {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.05;
    p.life *= 0.94;
    ctx.save();
    ctx.globalAlpha = p.life * 0.7;
    ctx.shadowBlur = 10;
    ctx.shadowColor = p.color;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function drawHandBeams(h1, h2) {
  // Draw energy beams between the two hands
  const wrist1 = getLandmarkPx(h1[0]);
  const wrist2 = getLandmarkPx(h2[0]);

  const colors = ['#00f5ff','#ff00ff','#00ff88','#ffff00','#ff6600'];
  const tips1 = [4, 8, 12, 16, 20];
  const tips2 = [4, 8, 12, 16, 20];

  for (let i = 0; i < tips1.length; i++) {
    const p1 = getLandmarkPx(h1[tips1[i]]);
    const p2 = getLandmarkPx(h2[tips2[i]]);
    const col = colors[i];

    // Animated wave along beam
    const segments = 20;
    const points = [];
    for (let s = 0; s <= segments; s++) {
      const t = s / segments;
      const baseX = p1.x + (p2.x - p1.x) * t;
      const baseY = p1.y + (p2.y - p1.y) * t;
      const perp = { x: -(p2.y - p1.y), y: p2.x - p1.x };
      const len = Math.hypot(perp.x, perp.y) || 1;
      const wave = Math.sin(t * Math.PI * 4 + time * 0.08 + i) * 8;
      points.push({ x: baseX + (perp.x/len)*wave, y: baseY + (perp.y/len)*wave });
    }

    ctx.save();
    ctx.shadowBlur = 20;
    ctx.shadowColor = col;
    ctx.strokeStyle = col;
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.9;
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    for (let s = 1; s < points.length; s++) {
      ctx.lineTo(points[s].x, points[s].y);
    }
    ctx.stroke();
    ctx.restore();

    // Sparks at midpoint
    const mid = points[Math.floor(segments/2)];
    if (Math.random() < 0.3) addParticle(mid.x, mid.y, col);
  }
}

function renderHands() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  time++;

  updateParticles();

  if (handsData.length === 0) return;

  // Update HUD
  document.getElementById('hud-hands').textContent = handsData.length;

  if (handsData.length >= 2) {
    drawHandBeams(handsData[0].landmarks, handsData[1].landmarks);
  }

  handsData.forEach((hand, hi) => {
    const lms = hand.landmarks;
    const colors = HAND_COLORS[hi % 2];

    // Draw connections
    FINGER_CONNECTIONS.forEach(([a, b], ci) => {
      const pa = getLandmarkPx(lms[a]);
      const pb = getLandmarkPx(lms[b]);
      const col = colors[ci % colors.length];
      drawNeonLine(pa.x, pa.y, pb.x, pb.y, col, 2, 15);
    });

    // Draw landmarks
    lms.forEach((lm, li) => {
      const p = getLandmarkPx(lm);
      const col = colors[li % colors.length];
      const isTip = [4,8,12,16,20].includes(li);
      drawNeonDot(p.x, p.y, isTip ? 7 : 4, col);
      if (isTip && Math.random() < 0.4) addParticle(p.x, p.y, col);
    });

    // Gesture detection
    const gesture = detectGesture(lms);
    const spread = getSpread(lms);
    document.getElementById('hud-gesture').textContent = gesture;
    document.getElementById('hud-spread').textContent = spread + '%';
    document.getElementById('gesture-badge').textContent = gesture;
  });

  // FPS
  frameCount++;
  const now = performance.now();
  if (now - lastTime > 500) {
    fps = Math.round(frameCount * 1000 / (now - lastTime));
    document.getElementById('hud-fps').textContent = fps;
    frameCount = 0;
    lastTime = now;
  }

  requestAnimationFrame(renderHands);
}

async function startApp() {
  document.getElementById('start-screen').style.display = 'none';
  const loading = document.getElementById('loading');
  loading.style.display = 'flex';

  // Init MediaPipe Hands
  const hands = new Hands({locateFile: (file) => {
    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
  }});

  hands.setOptions({
    maxNumHands: 2,
    modelComplexity: 1,
    minDetectionConfidence: 0.7,
    minTrackingConfidence: 0.6
  });

  hands.onResults((results) => {
    handsData = results.multiHandLandmarks
      ? results.multiHandLandmarks.map((lms, i) => ({ landmarks: lms }))
      : [];
  });

  // Camera
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720, facingMode: 'user' } });
    video.srcObject = stream;
    video.onloadedmetadata = async () => {
      await video.play();

      const camera = new Camera(video, {
        onFrame: async () => { await hands.send({ image: video }); },
        width: 1280, height: 720
      });
      await camera.start();
      loading.style.display = 'none';
      renderHands();
    };
  } catch (e) {
    loading.innerHTML = `<p style="color:#ff4444;letter-spacing:2px">CAMERA ACCESS DENIED<br><br><span style="font-size:11px;color:rgba(255,255,255,0.4)">Please allow camera permissions and reload.</span></p>`;
  }
}
</script>
</body>
</html>
